name: MealPrepTally
options:
  bundleIdPrefix: com.shimondeitel.mealprep
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  MealPrepTally:
    type: application
    platform: iOS
    sources:
      - path: MealPrepTally
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.mealprep
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: MealPrepTally/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  MealPrepTallyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MealPrepTallyTests
      - path: MealPrepTally.storekit
    dependencies:
      - target: MealPrepTally
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.mealprep.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  MealPrepTallyUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: MealPrepTallyUITests
    dependencies:
      - target: MealPrepTally
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.mealprep.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  MealPrepTally:
    build:
      targets:
        MealPrepTally: all
        MealPrepTallyTests: [test]
        MealPrepTallyUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: MealPrepTally.storekit
    test:
      config: Debug
      storeKitConfiguration: MealPrepTally.storekit
      targets:
        - MealPrepTallyTests
        - MealPrepTallyUITests
    archive:
      config: Release
